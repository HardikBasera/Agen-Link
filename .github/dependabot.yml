version: 2
updates:
  # Node helper: MCP server
  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(mcp-server)"
    labels:
      - "dependencies"
    # Build tooling: take minor/patch + security updates, but not major bumps.
    # We adopt TypeScript / @types/node majors deliberately, aligned to the Node
    # version we support. Runtime deps (e.g. zod) are intentionally NOT ignored —
    # we want to see their major releases.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Node helper: terminal host
  - package-ecosystem: "npm"
    directory: "/pty-host"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(pty-host)"
    labels:
      - "dependencies"

  # Keep GitHub Actions pinned actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
