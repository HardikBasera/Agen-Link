name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: workflow gets read-only access to the repo by default.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mcp-server:
    name: mcp-server build + build/ in sync
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - name: Install (no lifecycle scripts)
        run: npm ci --ignore-scripts
      - name: Build TypeScript
        run: npm run build
      - name: Verify committed build/ matches src/
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          if ! git diff --ignore-cr-at-eol --exit-code -- mcp-server/build; then
            echo "::error::mcp-server/build is out of sync with mcp-server/src."
            echo "Run 'npm run build' inside mcp-server/ and commit the regenerated build/ directory."
            exit 1
          fi

  pty-host:
    name: pty-host tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: pty-host
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pty-host/package-lock.json
      - name: Install (node-pty native build runs here)
        run: npm ci
      - name: Run tests
        run: npm test
