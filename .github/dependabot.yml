version: 2
updates:
  # Node helper: MCP server
  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(mcp-server)"
    labels:
      - "dependencies"

  # Node helper: terminal host
  - package-ecosystem: "npm"
    directory: "/pty-host"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(pty-host)"
    labels:
      - "dependencies"

  # Keep GitHub Actions pinned actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
